[pytest]
testpaths = tests
pythonpath = .
; Additional paths: src, worker (set order carefully)
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short --strict-markers
markers =
    unit: marks unit tests (fast, isolated with mocks)
    integration: marks integration tests (requires Redis/DB)
    performance: marks performance benchmarks
    slow: marks slow-running tests
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

# Coverage settings
[coverage:run]
source = 
    worker
    src
    plagiarism_core
    cli
    shared
omit =
    */tests/*
    */migrations/*
    */venv/*
    */env/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
