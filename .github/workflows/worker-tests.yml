name: Worker Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'worker/**'
      - 'tests/worker/**'
      - '.github/workflows/worker-tests.yml'
      - 'worker/requirements.txt'
  pull_request:
    branches: [ main ]
    paths:
      - 'worker/**'
      - 'tests/worker/**'
      - '.github/workflows/worker-tests.yml'
      - 'worker/requirements.txt'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpasswordthatis16characterslong
          POSTGRES_DB: test_plagiarism
        ports:
          - 5432:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install worker requirements including test deps
        pip install -r worker/requirements.txt
        # Install database requirements
        pip install -r database/requirements.txt
        # Install project in editable mode
        pip install -e .

    - name: Set environment variables
      run: |
        echo "REDIS_HOST=localhost" >> $GITHUB_ENV
        echo "REDIS_PORT=6379" >> $GITHUB_ENV
        echo "DB_HOST=localhost" >> $GITHUB_ENV
        echo "DB_PORT=5432" >> $GITHUB_ENV
        echo "DB_NAME=test_plagiarism" >> $GITHUB_ENV
        echo "DB_USER=test" >> $GITHUB_ENV
        echo "DB_PASS=testpasswordthatis16characterslong" >> $GITHUB_ENV
         echo "RMQ_PASS=testpasswordthatis16characterslong" >> $GITHUB_ENV
         echo "WORKER_CONCURRENCY=4" >> $GITHUB_ENV
        echo "WORKER_PREFETCH_COUNT=1" >> $GITHUB_ENV
        echo "LOG_LEVEL=INFO" >> $GITHUB_ENV
        echo "STORAGE_LOCAL_PATH=/tmp/test_s3_storage" >> $GITHUB_ENV
        mkdir -p /tmp/test_s3_storage

    - name: Wait for Redis
      run: |
        for i in {1..10}; do
          redis-cli ping && break || sleep 1
        done

    - name: Run unit tests
      run: |
        PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/worker:$GITHUB_WORKSPACE/src pytest tests/worker/unit -v --tb=short

    - name: Run integration tests
      run: |
        PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/worker:$GITHUB_WORKSPACE/src pytest tests/worker/integration -v -m "integration" --tb=short

    - name: Run performance regression tests
      run: |
        PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/worker:$GITHUB_WORKSPACE/src python tests/worker/performance/regression_suite.py

    - name: Run coverage
      run: |
        PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/worker:$GITHUB_WORKSPACE/src pytest tests/worker --cov=worker --cov=inverted_index --cov=config --cov=database --cov=redis_client --cov=cli --cov-report=xml --cov-report=term --cov-fail-under=30

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: worker
        name: worker-coverage
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          tests/**/pytest.xml
          coverage.xml
