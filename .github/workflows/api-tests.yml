name: API Integration Tests

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'src/**'
      - 'tests/integration/**'
      - '.github/workflows/api-tests.yml'
      - 'docker-compose.test.yml'
      - 'requirements*.txt'
  pull_request:
    branches: [ main ]
    paths:
      - 'src/**'
      - 'tests/integration/**'
      - '.github/workflows/api-tests.yml'
      - 'docker-compose.test.yml'
      - 'requirements*.txt'
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: testpasswordthatis16characterslong
          POSTGRES_DB: test_plagiarism
        ports:
          - 5433:5432
        options: --health-cmd pg_isready --health-interval 10s --health-timeout 5s --health-retries 5

      redis:
        image: redis:8.6.1-alpine
        ports:
          - 6380:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5

      rabbitmq:
        image: rabbitmq:4.2.4-management-alpine
        env:
          RABBITMQ_DEFAULT_USER: test_mq
          RABBITMQ_DEFAULT_PASS: testpasswordthatis16characterslong
        ports:
          - 5673:5672
          - 15673:15672
        options: --health-cmd rabbitmq-diagnostics -q status --health-interval 30s --health-timeout 10s --health-retries 5

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r database/requirements.txt
        pip install -e .

    - name: Set environment variables
      run: |
        echo "DB_HOST=localhost" >> $GITHUB_ENV
        echo "DB_PORT=5433" >> $GITHUB_ENV
        echo "DB_NAME=plagiarism_db" >> $GITHUB_ENV
        echo "DB_USER=plagiarism_user" >> $GITHUB_ENV
        echo "DB_PASS=iNseUMJMuFlX1Q5Sr6yPwjUDPprX4VMP" >> $GITHUB_ENV
        echo "REDIS_HOST=localhost" >> $GITHUB_ENV
        echo "REDIS_PORT=6380" >> $GITHUB_ENV
        echo "RMQ_HOST=localhost" >> $GITHUB_ENV
        echo "RMQ_PORT=5673" >> $GITHUB_ENV
        echo "RMQ_USER=plagiarism_mq_user" >> $GITHUB_ENV
        echo "RMQ_PASS=06l6of6Shsz9n11Is5nWAGO9oJsEXrcI" >> $GITHUB_ENV
        echo "INTEGRATION_TESTS=1" >> $GITHUB_ENV
        echo "STORAGE_LOCAL_PATH=/tmp/test_plagiarism_storage" >> $GITHUB_ENV
        echo "ENVIRONMENT=development" >> $GITHUB_ENV
        echo "LOG_LEVEL=ERROR" >> $GITHUB_ENV
        mkdir -p /tmp/test_plagiarism_storage

    - name: Wait for PostgreSQL
      run: |
        for i in {1..30}; do
          pg_isready -h localhost -p 5433 -U test && break || sleep 1
        done

    - name: Wait for Redis
      run: |
        for i in {1..30}; do
          redis-cli -h localhost -p 6380 ping && break || sleep 1
        done

    - name: Wait for RabbitMQ
      run: |
        for i in {1..30}; do
          rabbitmq-diagnostics -q ping && break || sleep 2
        done

    - name: Run database migrations
      run: |
        PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/src alembic upgrade head || true

    - name: Run integration tests
      run: |
        PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/src pytest tests/integration -v --tb=short -m "integration"

    - name: Run API endpoint tests
      run: |
        PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/src pytest tests/integration/test_api_endpoints.py -v --tb=short

    - name: Run E2E workflow tests
      run: |
        PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/src pytest tests/integration/test_e2e_workflow.py -v --tb=short

    - name: Run coverage
      run: |
        PYTHONPATH=$GITHUB_WORKSPACE:$GITHUB_WORKSPACE/src pytest tests/integration --cov=src --cov=src/app --cov-report=xml --cov-report=term --cov-fail-under=25

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: api-integration
        name: api-integration-coverage
      env:
        CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: api-test-results
        path: |
          tests/integration/**/*.xml
          coverage.xml